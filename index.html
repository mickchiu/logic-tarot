<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>✦ 邏輯塔羅 ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<style>

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif TC',serif;background:linear-gradient(135deg,#0a0a1a,#1a0a2e 50%,#0d0d2b);color:#e8d5b7;min-height:100vh;overflow-x:hidden}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(1px 1px at 20px 30px,#fff,transparent),radial-gradient(1px 1px at 90px 40px,#fff,transparent),radial-gradient(1.5px 1.5px at 160px 120px,rgba(255,255,255,.6),transparent),radial-gradient(1.2px 1.2px at 10px 90px,rgba(212,175,55,.4),transparent);background-size:200px 200px;animation:tw 4s ease-in-out infinite alternate}
@keyframes tw{0%{opacity:.4}100%{opacity:1}}

.scr{display:none;flex-direction:column;align-items:center;min-height:100vh;padding:20px;position:relative;z-index:1}
.scr.active{display:flex}
.back{position:absolute;top:15px;left:15px;background:none;border:1px solid rgba(212,175,55,.3);color:#9b89b6;padding:5px 14px;border-radius:20px;font-family:inherit;font-size:.8em;cursor:pointer;z-index:5}
.back:hover{color:#d4af37;border-color:#d4af37}

.gold-btn{background:linear-gradient(135deg,#d4af37,#b8942e);color:#1a0a2e;border:none;padding:15px 44px;font-size:1.1em;font-family:inherit;font-weight:700;border-radius:50px;cursor:pointer;transition:all .3s;letter-spacing:3px}
.gold-btn:hover{transform:scale(1.05);box-shadow:0 0 25px rgba(212,175,55,.5)}
.gold-btn:disabled{opacity:.5;cursor:default;transform:none}
.ghost-btn{background:transparent;border:1.5px solid rgba(212,175,55,.35);color:#d4af37;padding:12px 36px;font-size:.95em;font-family:inherit;border-radius:50px;cursor:pointer;letter-spacing:3px;margin:20px 0 35px}
.ghost-btn:hover{background:rgba(212,175,55,.1)}

.sec-title{color:#d4af37;font-size:1.35em;margin-bottom:8px;letter-spacing:3px;text-align:center}
.sec-sub{color:#9b89b6;font-size:.85em;margin-bottom:20px;text-align:center}

.sel-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:420px;width:100%}
.sel-btn{background:linear-gradient(135deg,rgba(26,10,62,.85),rgba(15,10,42,.9));border:1.5px solid rgba(155,89,182,.25);padding:16px 10px;font-family:inherit;font-size:.9em;border-radius:12px;cursor:pointer;transition:all .3s;text-align:center;color:#e8d5b7;line-height:1.5}
.sel-btn:hover{border-color:#d4af37;box-shadow:0 0 18px rgba(212,175,55,.2);transform:translateY(-2px)}
.sel-btn .si{font-size:1.4em;display:block;margin-bottom:4px}
.sel-btn .sn{color:#d4af37;font-weight:700;display:block}
.sel-btn .sd{font-size:.7em;color:#9b89b6;margin-top:3px;display:block}
.sel-btn.wide{grid-column:1/3}

.time-grid{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;max-width:400px}
.time-btn{background:rgba(26,10,62,.7);border:1.5px solid rgba(155,89,182,.25);padding:14px 24px;font-family:inherit;font-size:.95em;border-radius:30px;cursor:pointer;color:#e8d5b7;transition:all .3s;letter-spacing:1px}
.time-btn:hover{border-color:#d4af37;color:#d4af37;box-shadow:0 0 15px rgba(212,175,55,.15)}

#portal{justify-content:center;text-align:center}
.p-title{font-size:2.4em;font-weight:700;color:#d4af37;text-shadow:0 0 25px rgba(212,175,55,.5);letter-spacing:6px;margin-bottom:8px}
.p-sub{color:#9b89b6;font-size:1em;margin-bottom:8px;letter-spacing:3px}
.p-desc{color:#7a6b8a;font-size:.85em;max-width:300px;line-height:1.8;margin:0 auto 35px}

.path-display{color:#9b89b6;font-size:.82em;margin-bottom:14px;letter-spacing:1px;text-align:center}

.detect-box{background:linear-gradient(135deg,rgba(30,15,55,.92),rgba(20,12,40,.95));border:1px solid rgba(212,175,55,.4);border-left:4px solid #d4af37;border-radius:14px;padding:25px;max-width:420px;width:90%;animation:fadeUp .6s ease}
.detect-icon{font-size:2em;margin-bottom:8px}
.detect-spread{color:#d4af37;font-size:1.4em;font-weight:700;letter-spacing:3px;margin-bottom:10px}
.detect-reason{color:#c9b8dc;line-height:1.8;font-size:.92em;margin:14px 0;padding:14px;background:rgba(212,175,55,.06);border-radius:8px}
.detect-meta{color:#9b89b6;font-size:.8em;margin-top:8px}

.cmp-area{display:none;margin-top:18px;text-align:left}
.cmp-area.show{display:block}
.cmp-area label{display:block;color:#d4af37;font-size:.85em;margin:8px 0 4px}
.cmp-area input{width:100%;background:transparent;border:none;border-bottom:1.5px solid rgba(212,175,55,.3);color:#e8d5b7;font-family:inherit;font-size:.95em;padding:8px 4px;outline:none;text-align:center}
.cmp-area input:focus{border-color:#d4af37}

#shuffle-screen{justify-content:center;text-align:center}
.shuf-vis{display:flex;justify-content:center;gap:5px;margin:25px auto;flex-wrap:wrap;max-width:320px}
.mc{width:36px;height:56px;background:linear-gradient(135deg,#2a1a4e,#1a0a3e);border:1px solid rgba(212,175,55,.3);border-radius:4px;transition:all .5s}
.shuffling .mc{animation:shf .5s ease-in-out infinite alternate}
@keyframes shf{0%{transform:translate(0,0) rotate(0);opacity:.6}100%{transform:translate(calc((var(--r)-.5)*70px),calc((var(--r2)-.5)*50px)) rotate(calc((var(--r)-.5)*25deg));opacity:1}}
.shuf-hint{color:#9b89b6;margin-top:16px;font-size:.85em}
.shuf-info{color:#9b89b6;font-size:.9em;margin-bottom:8px;letter-spacing:2px}

#card-draw{padding-top:50px}
.draw-hint{color:#d4af37;font-size:1em;margin-bottom:14px;text-align:center;min-height:1.5em}
.phase-label{color:#d4af37;font-size:1.1em;font-weight:700;margin-bottom:10px;letter-spacing:2px;display:block}
.card-row-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:14px 0;scrollbar-width:none}
.card-row-wrap::-webkit-scrollbar{display:none}
.card-row{display:flex;gap:12px;padding:8px 24px;width:max-content}

/* === Card 3D Flip === */
.cc{perspective:1000px;cursor:pointer;flex-shrink:0}
.cd{width:115px;height:197px;position:relative;transform-style:preserve-3d;transition:transform .8s,box-shadow .3s;border-radius:8px}
.cd.flipped{transform:rotateY(180deg)}
.cd.flipped.reversed{transform:rotateY(180deg) rotate(180deg)}
.cf{position:absolute;inset:0;backface-visibility:hidden;border-radius:8px;overflow:hidden}

/* Card Back */
.cbk{background:linear-gradient(135deg,#2a1a5e,#1a0a3e 40%,#2a1a5e);border:2px solid rgba(212,175,55,.4);display:flex;flex-direction:column;align-items:center;justify-content:center}
.cbk::before{content:'';position:absolute;inset:6px;border:1px solid rgba(212,175,55,.2);border-radius:6px}
.cbs{font-size:2.5em;color:#d4af37;text-shadow:0 0 15px rgba(212,175,55,.5)}
.cbt{font-size:.55em;color:rgba(212,175,55,.35);letter-spacing:4px;margin-top:4px}

/* Card Front - NEW: image fills the card */
.cft{background:#1c1233;border:2px solid #d4af37;transform:rotateY(180deg);display:flex;flex-direction:column;align-items:stretch}
.cft-img-wrap{flex:1;position:relative;background:#0f0a20;display:flex;align-items:center;justify-content:center;overflow:hidden}
.cft-img{width:100%;height:100%;object-fit:cover;display:block}
.cft-emoji-fallback{display:none;font-size:3em;color:#d4af37;text-shadow:0 0 15px rgba(212,175,55,.4)}
.cft-img-wrap.no-img .cft-img{display:none}
.cft-img-wrap.no-img .cft-emoji-fallback{display:block}
.cft-label{background:linear-gradient(180deg,rgba(15,10,32,.9),#0f0a20);border-top:1px solid rgba(212,175,55,.4);padding:5px 6px;text-align:center}
.cft-label .cn{font-size:.78em;color:#e8d5b7;font-weight:700;letter-spacing:1px;line-height:1.2}
.cft-label .nu{font-size:.6em;color:#d4af37;font-weight:700;margin-right:4px}

.cc:hover .cd:not(.flipped){transform:translateY(-10px);box-shadow:0 8px 25px rgba(212,175,55,.2)}
.cc.selected .cd{transform:translateY(-18px);box-shadow:0 12px 35px rgba(212,175,55,.4)}
.cc.selected .cbk{border-color:#d4af37}

.confirm-wrap{margin-top:15px;min-height:50px;display:flex;align-items:center}
.draw-one-btn{background:rgba(212,175,55,.15);border:2px solid rgba(212,175,55,.5);color:#d4af37;padding:14px 35px;font-family:inherit;font-size:1em;font-weight:700;border-radius:12px;cursor:pointer;letter-spacing:2px;margin:10px 0}
.draw-one-btn:hover{background:rgba(212,175,55,.25);box-shadow:0 0 20px rgba(212,175,55,.3)}
.draw-one-btn:disabled{opacity:.4;cursor:default}
.drawn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin:15px 0}

#reading{padding-top:35px}
.rd-title{color:#d4af37;font-size:1.3em;margin-bottom:18px;letter-spacing:3px;text-align:center}
.rd-cards{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.rd-slot{display:flex;flex-direction:column;align-items:center;gap:5px}
.rd-slot .sl{color:#9b89b6;font-size:.78em;letter-spacing:1px}

.panels{display:flex;flex-direction:column;gap:14px;width:100%;max-width:640px;margin:10px auto 0}
.mp{background:linear-gradient(135deg,rgba(26,10,46,.85),rgba(15,10,32,.9));border:1px solid rgba(212,175,55,.25);border-radius:12px;overflow:hidden;opacity:0;transform:translateY(18px);transition:all .6s}
.mp.show{opacity:1;transform:translateY(0)}
.ep-head{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.ep-head .mpn{font-size:1.05em;font-weight:700;color:#d4af37}
.ep-head .mpo{font-size:.78em;padding:2px 9px;border-radius:20px;font-weight:700}
.mpo.up{background:rgba(76,175,80,.18);color:#81c784;border:1px solid rgba(76,175,80,.3)}
.mpo.rv{background:rgba(244,67,54,.18);color:#e57373;border:1px solid rgba(244,67,54,.3)}
.ep-head .mpe{font-size:.72em;color:#9b89b6}
.ep-arrow{color:#d4af37;font-size:.8em;transition:transform .3s;margin-left:auto}
.ep-arrow.open{transform:rotate(180deg)}
.ep-body{max-height:0;overflow:hidden;transition:max-height .4s ease;padding:0 16px}
.ep-body.open{max-height:1200px;padding:0 16px 16px}
.ep-body .mpm{font-size:.92em;line-height:1.85;padding-top:8px;border-top:1px solid rgba(212,175,55,.1)}

.synth{background:linear-gradient(135deg,rgba(30,15,55,.95),rgba(20,12,40,.98));border:1px solid rgba(212,175,55,.5);border-left:4px solid #d4af37;border-radius:12px;padding:20px;opacity:0;transform:translateY(20px);transition:all .8s}
.synth.show{opacity:1;transform:translateY(0)}
.synth-title{font-size:1.1em;color:#d4af37;font-weight:700;margin-bottom:12px;letter-spacing:2px;text-align:center}

.synth-body{line-height:2;font-size:.92em}
.synth-body .ss{margin-bottom:12px}
.synth-body .slab{color:#d4af37;font-weight:700}
.synth-body .sa{margin-top:12px;padding-top:12px;border-top:1px dashed rgba(212,175,55,.25);color:#c9b896}
.synth-body .fable{background:rgba(212,175,55,.05);border-radius:8px;padding:14px;margin-top:14px;line-height:1.9;font-style:italic;color:#c9b8dc}
.synth-body .fable-bridge{margin:10px 0;padding:10px 12px;background:rgba(212,175,55,.08);border-left:2px solid rgba(212,175,55,.5);border-radius:4px;color:#e8d5b7;font-style:normal;font-size:.92em;line-height:1.7}
.synth-body .fable-action{font-style:normal;font-weight:700;color:#d4af37;margin-top:10px;display:block}


.fail-msg{color:#e57373;text-align:center;padding:25px;line-height:2;font-size:1em}
.sparkle{position:fixed;width:5px;height:5px;border-radius:50%;pointer-events:none;animation:spk .8s ease forwards;z-index:99}
@keyframes spk{0%{opacity:1;transform:scale(1) translate(0,0)}100%{opacity:0;transform:scale(0) translate(var(--tx),var(--ty))}}
@keyframes fadeUp{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:translateY(0)}}

@media(min-width:768px){
.cd{width:135px;height:232px}
.cbs{font-size:3em}
.cft-label .cn{font-size:.88em}
}
@media(max-width:380px){
.cd{width:100px;height:172px}
.cft-label .cn{font-size:.7em}
.p-title{font-size:1.8em}
}
</style>
</head>
<body>
<div class="stars"></div>

<!-- 1. Portal -->
<div id="portal" class="scr active">
<div class="p-title">✦ 邏輯塔羅 ✦</div>
<div class="p-sub">靈魂演化的指引</div>
<div class="p-desc">以邏輯為骨、直覺為翼<br>每一張牌都是生命的參數<br>每一個牌陣都是靈魂的說明書</div>
<button class="gold-btn" onclick="goTo('theme-select')">開始占卜</button>
</div>

<!-- 2. Theme Select -->
<div id="theme-select" class="scr">
<button class="back" onclick="goTo('portal')">← 返回</button>
<div class="sec-title">你想問什麼？</div>
<div class="sec-sub">選擇一個主題方向</div>
<div class="sel-grid" id="theme-grid"></div>
</div>

<!-- 3. Subtopic Select -->
<div id="subtopic-select" class="scr">
<button class="back" onclick="goTo('theme-select')">← 返回</button>
<div class="sec-title" id="sub-title"></div>
<div class="sec-sub">更精確地描述你的問題</div>
<div class="sel-grid" id="sub-grid"></div>
</div>

<!-- 4. Time Select -->
<div id="time-select" class="scr">
<button class="back" onclick="goTo('subtopic-select')">← 返回</button>
<div class="sec-title">想看多遠的未來？</div>
<div class="sec-sub">塔羅適合半年以內的指引</div>
<div class="path-display" id="path-so-far"></div>
<div class="time-grid" id="time-grid"></div>
</div>

<!-- 5. Detect Result -->
<div id="detect-result" class="scr" style="justify-content:center;text-align:center">
<button class="back" onclick="goTo('time-select')">← 返回</button>
<div class="detect-box">
<div class="detect-icon" id="d-icon"></div>
<div class="detect-spread" id="d-spread"></div>
<div class="path-display" id="d-path"></div>
<div class="detect-reason" id="d-reason"></div>
<div class="detect-meta" id="d-meta"></div>
<div class="cmp-area" id="cmp-area">
<label>選項 A</label><input id="cmp-a" placeholder="">
<label>選項 B</label><input id="cmp-b" placeholder="">
</div>
<button class="gold-btn" onclick="goShuffle()" style="margin-top:20px">繼續</button>
</div>
</div>

<!-- 6. Shuffle -->
<div id="shuffle-screen" class="scr">
<div style="text-align:center;margin:auto">
<div class="shuf-info" id="shuf-info"></div>
<div class="shuf-vis" id="shuf-vis"></div>
<button class="gold-btn" id="shuf-btn" onclick="doShuffle()">洗 牌</button>
<div class="shuf-hint">靜心默想，讓牌與你共振…</div>
</div>
</div>

<!-- 7. Card Draw -->
<div id="card-draw" class="scr">
<div class="draw-hint" id="draw-hint"></div>
<div id="draw-area"></div>
<div class="confirm-wrap" id="confirm-wrap"></div>
</div>

<!-- 8. Reading -->
<div id="reading" class="scr">
<div class="rd-title" id="rd-title"></div>
<div class="rd-cards" id="rd-cards"></div>
<div class="panels" id="panels"></div>
<button class="ghost-btn" onclick="resetAll()">✦ 重新占卜 ✦</button>
</div>

<script>
// ============================================================
// PART A: Config + Card Data + Flow Logic
// ============================================================

// ===== Themes & Subtopics =====
const THEMES=[
{key:"love",icon:"💕",name:"感情",subs:[
{key:"single",icon:"🌸",name:"單身桃花",desc:"何時遇到對的人",spread:"future",reason:"你想了解桃花何時出現，使用未來之鏡預測近中遠期的感情走向。"},
{key:"crush",icon:"💭",name:"曖昧發展",desc:"對方心意、該不該表白",spread:"situation",reason:"曖昧中充滿變數，使用情境牌陣完整呈現過去、現在、挑戰與未來。"},
{key:"relationship",icon:"💑",name:"交往關係",desc:"感情穩定度、相處問題",spread:"situation",reason:"感情關係需要全面盤點，情境牌陣能揭示關係的過去脈絡到未來走向。"},
{key:"ex",icon:"🔄",name:"復合機會",desc:"前任、要不要回頭",spread:"compare",reason:"復合與否是典型的二選一抉擇，比較牌陣最能釐清兩條路徑的能量。",cmpA:"回到他身邊",cmpB:"向前走"},
{key:"marriage",icon:"💍",name:"婚姻家庭",desc:"結婚時機、婚後問題",spread:"situation",reason:"婚姻是人生大事，情境牌陣能完整呈現這段關係的全貌與走向。"}
]},
{key:"career",icon:"💼",name:"事業",subs:[
{key:"promotion",icon:"📈",name:"升遷加薪",desc:"機會、時機、阻礙",spread:"future",reason:"升遷是時機問題，使用未來之鏡預測近中遠期的職涯發展。"},
{key:"switch",icon:"🔀",name:"轉職跳槽",desc:"該不該換、新公司好不好",spread:"compare",reason:"轉職是留下與離開的抉擇，比較牌陣最適合分析兩條路。",cmpA:"留在現職",cmpB:"轉換跑道"},
{key:"startup",icon:"🚀",name:"創業經營",desc:"可行性、方向、合夥",spread:"majors",reason:"創業是重大人生決定，使用主牌牌陣揭示靈魂此刻最需要面對的核心課題。"},
{key:"interview",icon:"🎯",name:"面試求職",desc:"錄取機會、準備方向",spread:"future",reason:"求職結果是未來事件，使用未來之鏡預測近中遠期的發展走向。"},
{key:"colleague",icon:"🤝",name:"職場關係",desc:"主管同事相處",spread:"cause",reason:"職場衝突通常有深層原因，原因牌陣將揭示起因→發展→結果的完整脈絡。"}
]},
{key:"money",icon:"💰",name:"財運",subs:[
{key:"invest",icon:"📊",name:"投資理財",desc:"股票基金、進場時機",spread:"situation",reason:"投資需要分析當前局勢與挑戰，情境牌陣最適合全面盤點。"},
{key:"income",icon:"💵",name:"正財收入",desc:"薪資、加薪、副業",spread:"future",reason:"收入是時間軸上的變化，使用未來之鏡預測近中遠期的財務趨勢。"},
{key:"luck",icon:"🎲",name:"偏財運勢",desc:"意外之財、中獎運",spread:"future",reason:"偏財是運勢走向，使用未來之鏡觀察近中遠期的運勢波動。"},
{key:"house",icon:"🏠",name:"購屋置產",desc:"買房時機、房產投資",spread:"compare",reason:"購屋是買與不買的抉擇，比較牌陣能清楚分析兩個方向。",cmpA:"現在出手",cmpB:"繼續觀望"},
{key:"debt",icon:"💳",name:"債務財務",desc:"還債、資金周轉",spread:"cause",reason:"財務困境通常有根源，原因牌陣將追溯問題的因果鏈。"}
]},
{key:"social",icon:"👥",name:"人際",subs:[
{key:"family",icon:"👨‍👩‍👧",name:"家人關係",desc:"親子、手足、長輩",spread:"core",reason:"家庭問題通常有深層根源，核心牌陣將追溯到關鍵年齡的源頭印記。"},
{key:"friends",icon:"🧑‍🤝‍🧑",name:"朋友交際",desc:"友情、社交圈",spread:"situation",reason:"友誼需要全面了解現況，情境牌陣能呈現完整的關係動態。"},

// ===== Draw Logic =====
function initDraw(){
sel=[];cmpPhase=0;cmpA=[];cmpB=[];mjDrawn=[];mjFound=false;mjSupport=0;mjDeckIdx=0;
document.getElementById("confirm-wrap").innerHTML="";
document.getElementById("draw-area").innerHTML="";
if(spread==="majors")buildMajors();
else if(spread==="compare"){cmpPhase=1;buildCompare()}
else buildStandard();
}

function buildStandard(){
maxSel=SP[spread].n;sel=[];
display=deck.slice(0,10);
document.getElementById("draw-hint").textContent="請選擇 "+maxSel+" 張牌";
const area=document.getElementById("draw-area");
area.innerHTML='<div class="card-row-wrap"><div class="card-row" id="card-row"></div></div>';
const row=document.getElementById("card-row");
display.forEach((c,i)=>{
const el=document.createElement("div");el.className="cc";el.dataset.idx=i;
el.innerHTML='<div class="cd"><div class="cf cbk"><div class="cbs">✦</div><div class="cbt">TAROT</div></div><div class="cf cft">'+cardFrontHTML(c)+'</div></div>';
el.onclick=()=>toggleSelect(i);
row.appendChild(el);
});
}

function buildCompare(){
const labelA=document.getElementById("cmp-a").value||curSub.cmpA||"選項 A";
const labelB=document.getElementById("cmp-b").value||curSub.cmpB||"選項 B";
maxSel=3;sel=[];
const offset=cmpPhase===1?0:10;
display=deck.slice(offset,offset+10);
const hint=document.getElementById("draw-hint");
hint.innerHTML='<span class="phase-label">'+(cmpPhase===1?labelA:labelB)+'</span>請選擇 3 張牌';
const area=document.getElementById("draw-area");
area.innerHTML='<div class="card-row-wrap"><div class="card-row" id="card-row"></div></div>';
const row=document.getElementById("card-row");
display.forEach((c,i)=>{
const el=document.createElement("div");el.className="cc";el.dataset.idx=i;
el.innerHTML='<div class="cd"><div class="cf cbk"><div class="cbs">✦</div><div class="cbt">TAROT</div></div><div class="cf cft">'+cardFrontHTML(c)+'</div></div>';
el.onclick=()=>toggleSelect(i);
row.appendChild(el);
});
document.getElementById("confirm-wrap").innerHTML="";
}

function buildMajors(){
document.getElementById("draw-hint").textContent="逐張抽牌，尋找大阿爾克納…";
document.getElementById("draw-area").innerHTML='<div style="text-align:center"><button class="draw-one-btn" id="mj-btn" onclick="drawOneMajor()">🃏 抽一張牌</button><div class="drawn-row" id="mj-row"></div><div class="draw-hint" id="mj-msg"></div></div>';
}

function drawOneMajor(){
if(mjDeckIdx>=deck.length)return;
const c=deck[mjDeckIdx++];mjDrawn.push(c);
const row=document.getElementById("mj-row");
const idx=mjDrawn.length-1;
const el=document.createElement("div");el.className="cc";
el.innerHTML='<div class="cd" id="mjcd-'+idx+'"><div class="cf cbk"><div class="cbs">✦</div><div class="cbt">TAROT</div></div><div class="cf cft">'+cardFrontHTML(c)+'</div></div>';
row.appendChild(el);
setTimeout(()=>{const cd=document.getElementById("mjcd-"+idx);cd.classList.add("flipped");if(c.isReversed)cd.classList.add("reversed");sparkle(cd)},300);
const msg=document.getElementById("mj-msg");
const btn=document.getElementById("mj-btn");
if(!mjFound&&c.s==="major"){
mjFound=true;
setTimeout(()=>{msg.innerHTML='<span style="color:#81c784;font-weight:700">✦ 找到主牌「'+c.c+'」！再抽 2 張輔佐牌 ✦</span>';btn.textContent="🃏 抽輔佐牌"},800);
return;
}
if(mjFound){
mjSupport++;
if(mjSupport>=2){
btn.disabled=true;
setTimeout(()=>{msg.innerHTML='<span style="color:#d4af37">✦ 牌陣完成 ✦</span>';document.getElementById("confirm-wrap").innerHTML='<button class="gold-btn" onclick="showReading(mjDrawn)" style="animation:fadeUp .5s">✦ 查看解讀 ✦</button>'},800);
}
return;
}
const nonMajorCount=mjDrawn.filter(x=>x.s!=="major").length;
if(nonMajorCount>=5&&!mjFound){
btn.disabled=true;
setTimeout(()=>{msg.innerHTML='<div class="fail-msg">連續抽了 5 張牌仍未出現大阿爾克納。<br>這表示目前的問題可能尚未觸及核心，<br>建議重新調整問題後再次占卜。</div>';document.getElementById("confirm-wrap").innerHTML='<button class="gold-btn" onclick="resetAll()">✦ 重新占卜 ✦</button>'},800);
}else{msg.textContent="已抽 "+mjDrawn.length+" 張，尚未出現主牌…"}
}

function toggleSelect(idx){
const p=sel.indexOf(idx);
if(p>-1)sel.splice(p,1);else{if(sel.length>=maxSel)return;sel.push(idx)}
document.querySelectorAll("#card-row .cc").forEach((el,j)=>{el.classList.toggle("selected",sel.includes(j))});
const hint=document.getElementById("draw-hint");
const r=maxSel-sel.length;
if(spread==="compare"){
const labelA=document.getElementById("cmp-a").value||curSub.cmpA||"選項 A";
const labelB=document.getElementById("cmp-b").value||curSub.cmpB||"選項 B";
const ph=cmpPhase===1?labelA:labelB;
hint.innerHTML='<span class="phase-label">'+ph+'</span>'+(r>0?"請選擇 "+r+" 張牌":"已選好！");
}else{hint.textContent=r>0?"請選擇 "+r+" 張牌":"已選好！準備翻牌"}
document.getElementById("confirm-wrap").innerHTML=r===0?'<button class="gold-btn" onclick="confirmDraw()" style="animation:fadeUp .5s">✦ 翻 牌 ✦</button>':"";
}

function confirmDraw(){
const chosen=sel.map(i=>display[i]);
if(spread==="compare"&&cmpPhase===1){cmpA=chosen;cmpPhase=2;buildCompare();return}
if(spread==="compare"&&cmpPhase===2){cmpB=chosen;showReading([...cmpA,...cmpB]);return}
showReading(chosen);
}

function togglePanel(i){
const b=document.getElementById("epb-"+i);
const a=document.getElementById("arrow-"+i);
b.classList.toggle("open");a.classList.toggle("open");
}

function resetAll(){
curTheme=null;curSub=null;curTime=null;
goTo("portal");
}

// ===== Per-Card Paragraph Generator =====
function cm(c){return c.isReversed?c.rv:c.up}
function ori(c){return c.isReversed?"逆位":"正位"}

function genCardParagraph(c,label,idx){
const cx=CTX[cat]||CTX.general;
const sx=SUBCTX[curSub?curSub.key:"overall"]||SUBCTX.overall;
const tx=TIMECTX[curTime?curTime.key:"3m"]||TIMECTX["3m"];
const m=cm(c);
const isRev=c.isReversed;
const isMajor=c.s==="major";

const posIntro={
"起因":pick(["在事情最初的起點，","回溯到一切的源頭，","追溯"+sx.sub+"的起因，"]),
"發展":pick(["隨著事態的推進，","在中間的發展階段，","當事情逐漸展開時，"]),
"結果":pick(["最終，事情指向的結局是：","一切匯聚之後，呈現的結果是：","在因果鏈的末端，"]),
"近期":pick([tx.phrase+"，最先到來的變化是：","在最近的日子裡，","短期內你會首先感受到的是："]),
"中期":pick(["隨著時間推移，","進入中段之後，","當近期的能量沉澱後，"]),
"遠期":pick(["放眼更遠的未來，","在"+tx.short+"的尾聲，","長遠來看，"]),
"事件起源":pick(["這一切的起點可以追溯到：","在事件的最初，有一股力量在推動：","種子是在那時候埋下的——"]),
"關鍵年齡":"",
"核心影響":pick(["而這段經歷至今仍在產生的影響是：","那個印記到今天依然在運作：","這股殘餘的能量表現為："]),
"過去":pick(["回顧過去，","在此之前，影響"+sx.sub+"的背景是：","過去發生的事為現在埋下了伏筆——"]),
"現在":pick(["此刻，你正處於：","眼下的狀態是：","如果要描述你現在的處境——"]),
"挑戰":pick(["但是，最大的變數在於：","這裡是整個牌陣最需要留意的地方：","你需要跨越的關卡是："]),
"未來":pick(["如果順應牌的指引，未來的畫面是：",""+tx.short+"，事情最可能走向：","在前方等著你的是："])
};

let intro=posIntro[label]||"";

if(label==="關鍵年齡"){
const age=getAge(c);
const ageText=age===0?"在潛意識尚未成形之前":age<=6?"大約 "+age+" 歲，幼兒時期":age<=12?"大約 "+age+" 歲，童年時期":age<=14?"大約 "+age+" 歲，青少年初期":age<=18?"大約 "+age+" 歲，青少年時期":"大約 "+age+" 歲";
return c.c+"（"+ori(c)+"）指向了一個關鍵的時間點——<strong>"+ageText+"</strong>。在那個年紀，"+pick(["一個重要的事件在你的"+cx.aspect+"中留下了深刻的印記","你經歷了某件至今仍在影響你的事","一段關鍵的經歷在那時成形"])+
"。這張牌的能量是「"+m+"」，暗示當時的經歷帶有"+
(isRev?pick(["某種阻礙或壓抑的性質","未被完整處理的情緒","一些需要被正視的陰影"])
:pick(["正面但深刻的影響","某種天賦或模式的啟動","值得感恩的力量"]))+"。"+
pick(["這個印記一直在潛移默化地影響著你對"+sx.topic+"的態度。","理解這個時間點，是解開當前困境的鑰匙。","覺察到這段記憶，療癒就已經開始了。"]);
}

const majorNote=isMajor?pick(["作為大阿爾克納，這張牌的份量特別重——它代表的不只是事件，而是靈魂層級的課題。","大阿爾克納的出現代表這不是小事，而是你生命中一個重要的轉折信號。",""]):"";

const cardDesc=pick([
intro+c.c+"以"+ori(c)+"的姿態出現，帶來了「"+m+"」的訊息。",
intro+c.c+"（"+ori(c)+"）揭示了："+m+"。",
intro+"這個位置出現了"+c.c+"（"+ori(c)+"），它的核心訊息是「"+m+"」。"
]);

const subContext=pick([
"在"+sx.sub+"的脈絡下，"+pick([
"這意味著"+(isRev?"你可能正面臨某些"+pick(["內在的阻力","需要調整的狀態","尚未處理的課題"]):"事情正朝著"+pick(["有利的方向","正面的軌道","健康的狀態"])+"發展")+"。",
"這張牌提醒你"+(isRev?pick(["留意那些被忽略的訊號","不要迴避真正的問題","是時候面對不舒服的真相了"]):pick(["目前的方向是對的","你已經具備了需要的條件","這股正面的能量值得善加利用"]))+"。",
(isRev?"具體來說，「"+m+"」在"+sx.topic+"的語境下，可能表現為"+pick(["一種停滯感","某個你不願面對的事實","一個需要被打破的舊模式"])+"。"
:"具體來說，「"+m+"」在"+sx.topic+"中，代表"+pick(["一股正在推動你前進的力量","值得把握的積極訊號","一個正在成形的好機會"])+"。")
])
]);

const closing=pick([
majorNote+(isRev?pick(["但別擔心——逆位不代表壞事，它更像是一個溫柔的提醒：有些東西需要你重新審視。","逆位的出現是在說：調整方式，結果就會不同。","這是一個轉化的邀請，而非懲罰。"])
:pick(["這股能量是你的助力，順著它走就對了。","把握這張牌帶來的正面訊號，"+tx.short+"會有明顯的進展。","信任這個方向，你已經在對的路上了。"])),
""
]);

return cardDesc+" "+subContext+" "+closing;
}

// ===== Main Dispatcher =====
function genReading(chosen){
const cx=CTX[cat]||CTX.general;
const sx=SUBCTX[curSub?curSub.key:"overall"]||SUBCTX.overall;
const tx=TIMECTX[curTime?curTime.key:"3m"]||TIMECTX["3m"];
if(spread==="cause")return genCause(chosen,cx,sx,tx);
if(spread==="future")return genFuture(chosen,cx,sx,tx);
if(spread==="core")return genCore(chosen,cx,sx,tx);
if(spread==="situation")return genSituation(chosen,cx,sx,tx);
if(spread==="compare")return genCompare(chosen,cx,sx,tx);
if(spread==="majors")return genMajors(chosen,cx,sx,tx);
return"";
}

// ===== Spread Generators =====

// 1. Cause
function genCause(cards,cx,sx,tx){
const[c0,c1,c2]=cards;
const ups=cards.filter(c=>!c.isReversed).length;
const sum=pick([
"簡單來說，"+sx.sub+"並非偶然。",
"讓我把這三張牌串起來說一個故事。",
"這是一條清晰的因果鏈，讓我為你解讀。"
]);
const chain="事情從「"+c0.c+"」（"+cm(c0)+"）開始，這股起始的能量催生了中間的變化——「"+c1.c+"」帶來了「"+cm(c1)+"」的轉折。而這一切最終匯聚成「"+c2.c+"」的結果："+cm(c2)+"。"+
(ups>=2?"整體來看，正位牌佔多數，代表"+sx.sub+"的根源有正面的基礎，問題出在執行面而非方向上。"
:"逆位能量較強，暗示根源處就存在一些需要面對的課題——但正因為看見了，你才有機會從源頭改變。");
const advice=pick([
"建議你回到「起因」的位置，重新審視"+sx.sub+"最初的狀態。從根源調整，比在末端補救有效得多。",
""+tx.phrase+"，把注意力放在「"+c1.c+"」代表的發展階段——那是整個因果鏈中最容易介入改變的環節。"
]);
const fable=genFable(cards,cx,sx,tx);
return '<div class="ss">'+sum+'</div><div class="ss">'+chain+'</div><div class="ss sa"><span class="slab">✦ 建議：</span>'+advice+'</div>'+fable;
}

// 2. Future
function genFuture(cards,cx,sx,tx){
const[c0,c1,c2]=cards;
const ups=cards.filter(c=>!c.isReversed).length;
const sum=pick([
"三面鏡子為你照出了"+sx.sub+"在"+tx.short+"的發展軌跡。",
"讓我把近、中、遠期的畫面連起來看。",
""+tx.phrase+"，"+sx.topic+"的走向已經有了清晰的輪廓。"
]);
const flow="近期你會先感受到「"+c0.c+"」的能量——"+cm(c0)+"。這股力量會逐漸演變，進入中期後轉為「"+c1.c+"」："+cm(c1)+"。"+
"而在"+tx.short+"的尾聲，「"+c2.c+"」將成為主導的力量："+cm(c2)+"。";
const trend=ups>=2?
"整體趨勢是樂觀的。三張牌中正位居多，順著這個節奏走，"+tx.short+"會有不錯的收穫。"
:"需要留意一些挑戰。逆位牌較多，代表過程中會遇到一些阻力——但這不代表結果是壞的，它代表你需要更有意識地去應對。";
const fable=genFable(cards,cx,sx,tx);
return '<div class="ss">'+sum+'</div><div class="ss">'+flow+'</div><div class="ss sa"><span class="slab">✦ 整體趨勢：</span>'+trend+'</div>'+fable;
}

// 3. Core
function genCore(cards,cx,sx,tx){
const[c0,c1,c2]=cards;
const age=getAge(c1);
const ageText=age===0?"潛意識成形之前":age<=6?"大約 "+age+" 歲":age<=12?"大約 "+age+" 歲（童年）":age<=18?"大約 "+age+" 歲（青少年時期）":"大約 "+age+" 歲";
const sum="核心牌陣揭露了一段深藏在時間裡的印記——"+sx.sub+"的根源比你想像的更久遠。";
const narrative="一切始於「"+c0.c+"」的能量："+cm(c0)+"。這股力量在你<strong>"+ageText+"</strong>的時候，透過「"+c1.c+"」的形式烙印在你的生命中（"+cm(c1)+"）。"+
"那段經歷的影響一直延續到今天，以「"+c2.c+"」的方式運作著："+cm(c2)+"。"+
pick(["你可能沒有意識到，但這個模式一直在影響你對"+sx.topic+"的反應方式。",
"每當類似的情境出現，那段記憶就會被喚醒，驅動你做出同樣的選擇。",
"這解釋了為什麼在"+sx.topic+"上，某些模式總是反覆出現。"]);
const advice=pick([
"覺察就是療癒的起點。現在你已經看見了這條連結——從「"+c0.c+"」到「"+ageText+"」再到「"+c2.c+"」——下一步是允許自己用新的方式回應舊的模式。",
"試著回想"+ageText+"前後發生過什麼。不需要完美的記憶，只需要一個感覺。當你承認那段經歷的影響，它對你的控制力就會開始減弱。"
]);
const fable=genFable(cards,cx,sx,tx);
return '<div class="ss">'+sum+'</div><div class="ss">'+narrative+'</div><div class="ss sa"><span class="slab">✦ 深層連結：</span>'+advice+'</div>'+fable;
}

// 4. Situation
function genSituation(cards,cx,sx,tx){
const[c0,c1,c2,c3]=cards;
const sum=pick([
"四張牌完整呈現了"+sx.sub+"從過去到未來的全貌。讓我幫你串起來看。",
"情境牌陣像一部四幕劇，而"+sx.sub+"的劇本已經攤開在你面前。",
""+tx.phrase+"，"+sx.topic+"的動態全貌如下——"
]);
const narrative="過去，「"+c0.c+"」的能量（"+cm(c0)+"）塑造了現在的基礎。你此刻正處於「"+c1.c+"」的狀態——"+cm(c1)+"。"+
"然而，「"+c2.c+"」以"+ori(c2)+"的姿態出現在挑戰的位置："+cm(c2)+"。這是"+tx.short+"內你最需要面對的變數。"+
"好消息是，未來牌「"+c3.c+"」指向了："+cm(c3)+"。"+
(c3.isReversed?"雖然是逆位，但這更像是一個提醒——結果不是註定的，你的選擇會影響最終走向。"
:"這是一張正位牌，代表如果你能處理好挑戰，未來是值得期待的。");
const key="關鍵在「"+c2.c+"」——"+pick([
"它是整個牌陣的轉折點。化解了它，從「"+c1.c+"」到「"+c3.c+"」的路就通了。",
"挑戰牌不是來阻擋你的，它是來告訴你：這裡有一個你還沒看見的盲點。看見它，你就自由了。",
"把它想成一道關卡。"+tx.phrase+"，集中精力突破這一關，其他的自然會跟著好轉。"
]);
const fable=genFable(cards,cx,sx,tx);
return '<div class="ss">'+sum+'</div><div class="ss">'+narrative+'</div><div class="ss sa"><span class="slab">✦ 建議：</span>'+key+'</div>'+fable;
}

// 5. Compare
function genCompare(cards,cx,sx,tx){
const la=document.getElementById("cmp-a").value||curSub.cmpA||"選項 A";
const lb=document.getElementById("cmp-b").value||curSub.cmpB||"選項 B";
const a=cards.slice(0,3),b=cards.slice(3,6);
const aUp=a.filter(c=>!c.isReversed).length;
const bUp=b.filter(c=>!c.isReversed).length;
const sum=pick([
"兩條路，兩組牌。讓我為你拆解「"+la+"」和「"+lb+"」各自的能量。",
"比較牌陣最誠實——它不會告訴你該選哪個，但它會讓你看清每條路上有什麼。",
""+tx.phrase+"，這兩個選擇在"+cx.area+"中呈現出截然不同的面貌。"
]);
const sideA="「"+la+"」這邊："+a.map(c=>c.c+"（"+ori(c)+"："+cm(c)+"）").join("；")+"。"+
(aUp>=2?"正位牌佔多數，這條路整體能量較為順暢，阻力較小。"
:"逆位能量較強，走這條路需要面對更多的調整和挑戰。");
const sideB="「"+lb+"」這邊："+b.map(c=>c.c+"（"+ori(c)+"："+cm(c)+"）").join("；")+"。"+
(bUp>=2?"正位能量佔優，這條路有比較明確的正向發展基礎。"
:"逆位較多，意味著這個方向目前的條件還不夠成熟。");
let verdict;
if(aUp>bUp)verdict="從"+tx.short+"的能量來看，「"+la+"」的條件更成熟一些。但牌只是呈現能量的傾向——如果你的心強烈地被「"+lb+"」吸引，那也是一個不該忽視的訊號。";
else if(bUp>aUp)verdict="「"+lb+"」在"+tx.short+"展現了更順暢的能量。不過，最好的選擇永遠不只是看哪條路比較輕鬆，而是看哪條路的結果是你真正想要的。";
else verdict="兩條路的能量旗鼓相當——沒有一條是明顯更好的。這種時候，牌在告訴你：答案不在外面，在你心裡。你更願意承擔哪條路的代價？那就是你的答案。";
const fable=genFable(cards,cx,sx,tx);
return '<div class="ss">'+sum+'</div><div class="ss"><span class="slab">【'+la+'】</span>'+sideA+'</div><div class="ss"><span class="slab">【'+lb+'】</span>'+sideB+'</div><div class="ss sa"><span class="slab">✦ 綜合比較：</span>'+verdict+'</div>'+fable;
}

// 6. Majors
function genMajors(cards,cx,sx,tx){
const mjIdx=cards.findIndex(c=>c.s==="major");
if(mjIdx<0)return'<div class="ss">未能找到核心主牌。</div>';

const supports=cards.slice(mjIdx+1,mjIdx+3);
const explores=cards.slice(0,mjIdx);
let h="";

h+='<div class="ss">在找到主牌之前，你經過了 '+explores.length+' 張探索牌（'+explores.map(c=>c.c).join("、")+'）。'+
pick(["這些牌像是抵達答案前必經的走廊——它們不是核心，但它們告訴你：問題的外層長什麼樣子。",
"每一張探索牌都是命運在說：「還不是，再往深處走。」直到你觸及了真正的核心。",
"這些前奏暗示了問題的表面結構。但真正的答案，在下一張牌裡。"])+'</div>';
}
const majorDesc=pick([
"大阿爾克納「"+major.c+"」以"+ori(major)+"的姿態作為核心指引現身："+cm(major)+"。這不是一個小事件——這是你的靈魂此刻最需要面對的課題。",
"「"+major.c+"」——"+cm(major)+"。在邏輯塔羅的體系中，大阿爾克納代表的是靈魂演化的關鍵節點。它的出現意味著："+sx.sub+"觸及了你生命中一個重大的轉折。",
"命運揭示了「"+major.c+"」（"+ori(major)+"）："+cm(major)+"。這張牌是整個占卜的核心——你問的所有問題，最終都指向它。"
]);
h+='<div class="ss"><span class="slab">【核心主牌】'+major.fb+' '+major.c+'</span><br>'+majorDesc+'</div>';
if(supports[0]){
h+='<div class="ss"><span class="slab">【輔佐牌一】'+supports[0].c+'（'+ori(supports[0])+'）</span><br>'+
"第一張輔佐牌為主牌提供了具體的行動方向："+cm(supports[0])+"。"+
pick(["如果說主牌是「你該面對什麼」，那這張牌就是「你該怎麼做」。","這是落實主牌指引的第一步——從這裡切入，"+sx.topic+"會開始轉變。","它把主牌的抽象課題具體化了。"])+'</div>';
}
if(supports[1]){
h+='<div class="ss"><span class="slab">【輔佐牌二】'+supports[1].c+'（'+ori(supports[1])+'）</span><br>'+
"第二張輔佐牌補充了另一個面向："+cm(supports[1])+"。"+
pick(["結合兩張輔佐牌，你的行動方案就完整了。","這股能量會在你執行的過程中伴隨著你。","三張牌的智慧交織在一起，構成了一幅完整的指引圖。"])+'</div>';
}
const advice="核心主牌「"+major.c+"」揭示的課題，透過「"+(supports.map(s=>s.c).join("」和「"))+"」的輔助，"+
pick(["為你在"+sx.topic+"上指出了一條清晰的路。","在"+tx.short+"，帶著這份覺知前行，你會感受到真實的轉化。","把這三張牌的智慧融入日常的決定中，改變會比你想像的更快到來。"]);
h+='<div class="ss sa"><span class="slab">✦ 行動指引：</span>'+advice+'</div>';
h+=genFable(cards,cx,sx,tx);
return h;
}

// ============================================================
// FABLE SELECTOR - 90 stories matching engine
// ============================================================

function genFable(cards,cx,sx,tx){
// 1. Determine energy
const ups=cards.filter(c=>!c.isReversed).length;
const total=cards.length;
const ratio=ups/total;
let energy;
if(ratio>=0.66)energy="positive";
else if(ratio<=0.34)energy="shadow";
else energy="balanced";

// 2. Filter stories by theme + energy
const themeMatched=STORIES.filter(s=>s.themes.includes(cat)&&s.energy===energy);
let pool=themeMatched.length>0?themeMatched:STORIES.filter(s=>s.energy===energy);
if(pool.length===0)pool=STORIES;

// 3. Random select from pool
const selected=pick(pool);

// 4. Find matching action by subtopic key
const subKey=curSub?curSub.key:"overall";
let actionTpl=selected.actions[subKey]||selected.actions.default||"信任這個過程。{time}，答案會自己出現。";

// 5. Substitute {time} and {cards}
const timePhrase=tx.phrase;
const keyCard=cards[cards.length-1]; // 最關鍵的那張（通常是最後一張：未來/結果/主牌）
const keyCardName=keyCard.c;
actionTpl=actionTpl.replace(/\{time\}/g,timePhrase).replace(/\{cards\}/g,"「"+keyCardName+"」");

// 6. ★ NEW: 自動生成「故事↔牌面」橋接句
const bridge=buildBridge(cards,keyCard,energy);

return '<div class="fable">'+selected.story+'<div class="fable-bridge">'+bridge+'</div><span class="fable-action">'+actionTpl+'</span></div>';
}

// ===== Bridge sentence builder =====
function buildBridge(cards,keyCard,energy){
// 把所有抽到的牌名整理出來
const names=cards.map(c=>c.c);
const upNames=cards.filter(c=>!c.isReversed).map(c=>c.c);
const rvNames=cards.filter(c=>c.isReversed).map(c=>c.c);

// 找出大阿爾克納（如果有）
const majors=cards.filter(c=>c.s==="major");
const hasMajor=majors.length>0;
const keyOri=keyCard.isReversed?"逆位":"正位";
const keyMeaning=keyCard.isReversed?keyCard.rv:keyCard.up;

// 根據能量挑選不同的橋接模板
const positiveBridges=[
"你抽到的這組牌——尤其是「"+keyCard.c+"」（"+keyOri+"："+keyMeaning+"）——正呼應了這個故事的核心：你已經在路上了。",
"看看你的牌：「"+names.join("、")+"」。它們和這個故事說的是同一件事——能量在你這邊，行動的時候到了。",
"這個故事不是隨機的。「"+keyCard.c+"」"+keyOri+"出現在最重要的位置，告訴你"+keyMeaning+"——就像故事裡那個成功的時刻。",
"「"+keyCard.c+"」（"+keyOri+"）正是故事想對你說的話。",
hasMajor?"特別是大阿爾克納「"+majors[0].c+"」的出現，加重了這個故事的份量——這不是小事，是靈魂層級的指引。":"當你看著這些牌，再回頭看這個故事，你會發現它們指向同一個方向。"
];

const balancedBridges=[
"你抽到的牌正逆參半——「"+upNames.join("、")+"」是正位，「"+rvNames.join("、")+"」是逆位。這個故事說的就是這種「中間狀態」：既不是全面順遂，也不是全面卡關。",
"看看「"+keyCard.c+"」（"+keyOri+"："+keyMeaning+"），它正好呼應了故事的核心訊息——這是一個需要平衡的時刻。",
"這個故事為什麼適合你？因為你的牌組裡有正有逆——正像故事裡那個矛盾的處境。「"+keyCard.c+"」是其中最重要的線索。",
"「"+keyCard.c+"」"+keyOri+"出現，意思是"+keyMeaning+"。配上其他牌的訊息，這個故事正好說中你的狀態。",
hasMajor?"大阿爾克納「"+majors[0].c+"」的出現提醒你：這不是普通的選擇，是人生階段的轉折。":"故事裡的兩個方向，就像你的牌組裡的正逆——兩個都是真的。"
];

const shadowBridges=[
"你抽到的牌以逆位為主——「"+rvNames.join("、")+"」。這個故事不是來嚇你的，是來告訴你：這個階段的功課，就是面對。",
"「"+keyCard.c+"」（逆位："+keyMeaning+"）出現在最關鍵的位置，正是故事想揭示的真相。",
"逆位多不代表壞事，它代表「需要重新看待」。看看「"+keyCard.c+"」——它和這個故事說的是同一件事。",
"你的牌組告訴我，現在是一個需要誠實面對的時期。「"+keyCard.c+"」"+keyOri+"——意味著"+keyMeaning+"。故事裡的領悟，正是給你的。",
hasMajor?"特別是大阿爾克納「"+majors[0].c+"」的出現——這是靈魂在說：是時候面對這個了。":"故事裡的轉折，呼應了你的牌組中那些逆位的訊息。"
];

let pool;
if(energy==="positive")pool=positiveBridges;
else if(energy==="shadow")pool=shadowBridges;
else pool=balancedBridges;

return pick(pool);
}
